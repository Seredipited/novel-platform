server:
  port: 8084

spring:
  application:
    name: ai-service
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:18848

# 通义千问 API 配置（去阿里云百炼平台获取: https://bailian.console.aliyun.com/）
# ⚠️ 密钥通过环境变量 DASHSCOPE_API_KEY 传入，切勿在此硬编码
ai:
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:}
    model: qwen-flash
